<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
<body>
    <div class="container"></div>
    <h4>Waiting for Avengers Doomsday</h4>
    <div class="spinner-border text-success"></div>
    <div class="container" style="width: 200px;">
        <div class="card">
            <img src="Avengers poster.png">
            <div class="card-title">
                <b>Avengers</b>
            </div>
            <div class="card text">
                <p>The first Avengers movie.</p>
            </div>
        </div>
    </div>
    <div class="container" style="width: 200px;">
        <div class="card">
            <img src="Avengers age of ultron poster.png">
            <div class="card-title">
                <b>Avengers Age of Ultron</b>
            </div>
            <div class="card text">
                <p>The second Avengers movie.</p>
            </div>
        </div>
    </div>
    <div class="container" style="width: 200px;">
        <div class="card">
            <img src="Avengers infinity war poster.png">
            <div class="card-title">
                <b>Avengers Infinity War</b>
            </div>
            <div class="card text">
                <p>The third Avengers movie.</p>
            </div>
        </div>
    </div>
    <div class="container" style="width: 200px;">
        <div class="card">
            <img src="Avengers endgame poster.png">
            <div class="card-title">
                <b>Avengers Endgame</b>
            </div>
            <div class="card text">
                <p>The fourth Avengers movie.</p>
            </div>
        </div>
    </div>
    <div class="container">
        <p>Hop Through pages</p>
        <ul class="pagination">
            <li class="page-item">
                <a class="page-link" href="#">
                    << </a>
            </li>
            <li class="page-item">
                <a class="page-link" href="#">1</a>
            </li>
            <li class="page-item">
                <a class="page-link" href="#">2</a>
            </li>
            <li class="page-item">
                <a class="page-link" href="#">3</a>
            </li>
            <li class="page-item">
                <a class="page-link" href="#">>></a>
            </li>
        </ul>
    </div>
</body>
</html>
