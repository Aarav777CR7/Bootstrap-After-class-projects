<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js">

    </script>
    <style>
        .col {
            text-align: center;
            border: 1px solid rgb(0, 119, 255);
    
        }
    </style>
</head>
<body>
    <h4>The Spelling club</h4>
    <div class="container">
        <div class="row">
            <div class="col">
                Round 1- Easy
            </div>
            <div class="col">
                Round 2- Medium
            </div>
            <div class="col">
                Round 3- Hard
            </div>
        </div>
    </div>
    <hr>
    <div class="container">
        <div class="row">
            <div class="col-xs" style="background-color: rgb(0, 255, 0);">
                Prize- Certificate of Participation
            </div>
            <div class="col-md" style="background-color: rgb(255, 251, 0);">
                Prize- Medal of Merit
            </div>
            <div class="col-lg" style="background-color: rgb(255, 0, 0);">
                Prize- Trophy of Success
            </div>
        </div>
    </div>

</html>
